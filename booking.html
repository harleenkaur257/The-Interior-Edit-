<div class="container">

    <div class="video-box">
        <video src="images/booking (2).mp4" autoplay muted loop></video>
    </div>

    <div class="form-box">
        <h2>Booking Form</h2>

        <form id="bookingForm">

            <input type="text" id="name" placeholder="Full Name">

            <input type="email" id="email" placeholder="Email">

            <input type="tel" id="phone" placeholder="Phone Number">

            <input type="text" id="city" placeholder="City">

            <select id="design">
                <option value="">Select Design</option>
                <option>Living Room</option>
                <option>Bedroom</option>
                <option>Bathroom</option>
                <option>Wardrobe</option>
                <option>Office Room</option>
                <option>Kitchen</option>
                <option>Dining Room</option>
                <option>Pooja Room</option>
            </select>

            <textarea id="message" placeholder="Message" rows="4"></textarea>

            <button type="submit">Submit</button>
            <button type="reset" id="resetBtn" class="reset-btn">Reset</button>

        </form>
    </div>

</div>

<script>
document.getElementById("bookingForm").addEventListener("submit", function(event) {
    event.preventDefault();

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let city = document.getElementById("city").value.trim();
    let design = document.getElementById("design").value;
    let message = document.getElementById("message").value.trim();

    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    let phonePattern = /^[0-9]+$/;

    if (name === "" || email === "" || phone === "" || city === "" || design === "") {
        alert("Please fill all required fields");
        return;
    }

    if (!emailPattern.test(email)) {
        alert("Enter a valid email");
        return;
    }

    if (!phonePattern.test(phone)) {
        alert("Phone must contain digits only");
        return;
    }

    alert("Form Submitted Successfully!");
    this.reset();
});

document.getElementById("resetBtn").addEventListener("click", function() {
    alert("Form Reset Successfully");
});
</script>
