<div class="review-container">
    <div class="review-video">
        <video autoplay muted loop>
            <source src="images/review.mp4" type="video/mp4">
        </video>
</div>
    <div class="submit-review" id="submit-review">
        <h2>Write a Review</h2>
        <form id="reviewForm">
            <input type="text" id="reviewName" placeholder="Your Name" required>
            <input type="email" id="reviewEmail" placeholder="Your Email" required>
            <select id="reviewRating" required>
                <option value="">Select Rating</option>
                <option value="5">★★★★★ 5</option>
                <option value="4">★★★★☆ 4</option>
                <option value="3">★★★☆☆ 3</option>
                <option value="2">★★☆☆☆ 2</option>
                <option value="1">★☆☆☆☆ 1</option>
            </select>
            <textarea id="reviewMessage" placeholder="Your Review" rows="4" required></textarea>
            <button type="submit">Submit Review</button>
        </form>
    </div>
</div>

<script>
const reviewForm = document.getElementById('reviewForm');

reviewForm.addEventListener('submit', function(e) {
    e.preventDefault();
    const name = document.getElementById('reviewName').value.trim();
    const email = document.getElementById('reviewEmail').value.trim();
    const rating = document.getElementById('reviewRating').value;
    const message = document.getElementById('reviewMessage').value.trim();

    if (!name || !email || !rating || !message) {
        alert('Please fill in all fields.');
        return;
    }

    alert('Thank you, ' + name + '! Your review has been submitted successfully.');
    reviewForm.reset();
});
</script>
